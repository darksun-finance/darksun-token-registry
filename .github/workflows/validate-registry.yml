name: Validate Registry

on:
  pull_request:
    paths:
      - 'registry/**'
      - 'scripts/**'
      - 'schemas/**'
      - '.github/workflows/validate-registry.yml'
      - 'package.json'
  push:
    branches:
      - main
    paths:
      - 'registry/**'
      - 'scripts/**'
      - 'schemas/**'
      - '.github/workflows/validate-registry.yml'
      - 'package.json'
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Validate registry
        run: npm run validate
